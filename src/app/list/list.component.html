<section>
  <div class="example-button-row">
    <div class="example-button-container items-counter">
      Items: {{dataSource.data.length}}
    </div>
    <div class="example-button-container">
      <button
        (click)="ignoreSelected()"
        mat-fab color="primary" aria-label="Example icon button with a delete icon"
      >
        <mat-icon>delete</mat-icon>
      </button>
    </div>

    <div class="example-button-container">
      <button
        (click)="favoriteSelected()"
        mat-fab aria-label="Example icon button with a heart icon"
      >
        <mat-icon>favorite</mat-icon>
      </button>
    </div>

    <div class="example-button-container">
      <button
        (click)="revertSelection()"
        mat-fab aria-label="Example icon button with a heart icon"
      >
        <mat-icon>revert</mat-icon>
      </button>
    </div>
  </div>

</section>

<!--<mat-paginator #paginator showFirstLastButtons></mat-paginator>-->
<table #matTable mat-table [dataSource]="dataSource">
  <ng-container matColumnDef="select">
    <th mat-header-cell *matHeaderCellDef>
      <mat-checkbox (change)="$event ? masterToggle() : null"
                    [checked]="selection.hasValue() && isAllSelected()"
                    [indeterminate]="selection.hasValue() && !isAllSelected()">
      </mat-checkbox>
    </th>
    <td mat-cell *matCellDef="let row">
      <mat-checkbox (click)="$event.stopPropagation()"
                    (change)="$event ? selection.toggle(row) : null"
                    [checked]="selection.isSelected(row)">
      </mat-checkbox>
    </td>
  </ng-container>

  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef> Price</th>
    <td mat-cell *matCellDef="let article"> {{ article.price }} EUR </td>
  </ng-container>

  <ng-container matColumnDef="searchKeywords">
    <th mat-header-cell *matHeaderCellDef> Keyword</th>
    <td mat-cell *matCellDef="let article" class="keywords-cell">
      <span *ngIf="article.searchKeywords?.length; else noKeywords">
        <span class="keyword-item" *ngFor="let keyword of article.searchKeywords; let last = last">
          <a
            class="keyword-remove"
            href="#"
            (click)="$event.preventDefault(); removeKeyword(keyword)"
            [attr.aria-label]="'Delete articles by keyword ' + keyword"
            title="Delete all articles found by this keyword"
          >-</a>
          <span class="keyword-text">{{ keyword }}</span><span *ngIf="!last">, </span>
        </span>
      </span>
      <ng-template #noKeywords>-</ng-template>
    </td>
  </ng-container>

  <ng-container matColumnDef="image">
    <th mat-header-cell *matHeaderCellDef> Image</th>
    <td mat-cell *matCellDef="let article"><img class="article-image" src="{{article.hrefImage}}"></td>
  </ng-container>

  <ng-container matColumnDef="locationStr">
    <th mat-header-cell *matHeaderCellDef> Location</th>
    <td mat-cell *matCellDef="let article"> {{article.location}} </td>
  </ng-container>

  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef> Title</th>
    <td mat-cell
        [class.favorite-row]="article?.isFavorite"
        (click)="$event.stopPropagation()"
        *matCellDef="let article">
      <a
        class="article-link"
        [href]="articlesService.resolveArticleHref(article?.href)"
        target="_blank"
        rel="noopener noreferrer"
      >
        {{article?.title}}
      </a>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"
      [class.favorite-row]="row.isFavorite"
      (click)="selection.toggle(row)">
  </tr>
</table>

<br><br>
<div>
  <button mat-raised-button (click)="logSelection()">Console Log Selected</button>
</div>
